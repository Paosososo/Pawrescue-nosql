<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PawRescue - Providers</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>PawRescue NoSQL</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="providers.html" class="active">Providers</a></li>
                <li><a href="shelters.html">Shelters</a></li>
                <li><a href="donations.html">Donations</a></li>
                <li><a href="reservations.html">Reservations</a></li>
                <li><a href="reports.html">Reports</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h2>Manage Providers</h2>
        <div class="card">
            <h3 id="formTitle">Add New Provider</h3>
            <form id="providerForm">
                <input type="hidden" id="providerId">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" id="name" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" required>
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input type="text" id="phone">
                </div>
                <div class="form-group">
                    <label>Address</label>
                    <input type="text" id="address">
                </div>
                <button type="submit">Save Provider</button>
            </form>
        </div>

        <h2>Providers List</h2>
        <table>
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Address</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="providersTableBody">
            </tbody>
        </table>
    </main>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => initProviders());
    </script>
</body>
</html>
