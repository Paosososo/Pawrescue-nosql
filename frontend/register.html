<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PawRescue - Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-screen">
    <div class="header-bar text-center">
        <h1 class="app-logo">PawRescue</h1>
        <p class="page-greeting">Choose your role to get started</p>
    </div>

    <div class="screen-content mt-24">
        
        <div class="role-box" onclick="location.href='login.html'">
            <div style="font-size: 40px; margin-bottom: 10px;">🍲</div>
            Food Provider
            <div style="font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 4px;">I have surplus food to donate</div>
        </div>

        <div class="role-box" onclick="location.href='login.html'">
            <div style="font-size: 40px; margin-bottom: 10px;">🐕</div>
            Animal Shelter
            <div style="font-size: 12px; font-weight: 400; color: var(--text-muted); margin-top: 4px;">I need food for rescued animals</div>
        </div>

    </div>
</div>

<script src="app.js"></script>
</body>
</html>
