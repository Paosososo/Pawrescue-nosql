<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Donation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body id="providerCreatePage">

<div class="app-screen">
    <div class="header-bar">
        <h1 class="app-logo">List Supply</h1>
        <p class="page-greeting">Offer available food</p>
    </div>

    <div class="screen-content">
        
        <form id="providerCreateForm" class="card">
            <!-- Hidden field for Edit Operation matching the Update requirement -->
            <input type="hidden" id="editDonationId">
            <h3 class="section-title" id="formActionTitle" style="margin-top:0;">Donation Information</h3>
            
            <div class="form-group">
                <label>Food Name</label>
                <input type="text" id="foodName" class="form-input" placeholder="e.g. Dry Salmon Kibble" required>
            </div>
            
            <div style="display: flex; gap: 12px;">
                <div class="form-group" style="flex: 1;">
                    <label>Amount Quantity</label>
                    <input type="number" id="quantity" class="form-input" value="1" required>
                </div>
                <div class="form-group" style="flex: 1;">
                    <label>Unit (kg, lb)</label>
                    <select id="unit" class="form-input">
                        <option value="kg">kg</option>
                        <option value="lbs">lbs</option>
                        <option value="cans">cans</option>
                    </select>
                </div>
            </div>

            <div class="form-group mb-16">
                <label>Category Group</label>
                <select id="category" class="form-input" required>
                    <option value="Dry Food">Dry Food</option>
                    <option value="Wet Food">Wet Food</option>
                    <option value="Treats">Treats</option>
                    <option value="Supplies">Supplies</option>
                </select>
            </div>
            
            <button type="submit" id="submitBtnText" class="btn-primary">Post Donation</button>
        </form>
    </div>

    <nav class="bottom-nav">
        <a href="provider-dashboard.html"><i class="nav-icon">🏠</i>Home</a>
        <a href="provider-create.html" class="active"><i class="nav-icon">➕</i>Create</a>
        <a href="provider-history.html"><i class="nav-icon">📋</i>History</a>
        <a href="login.html" onclick="logout()"><i class="nav-icon">👤</i>Logout</a>
    </nav>
</div>

<script src="app.js"></script>
</body>
</html>
